# ImageBot 配置文件模板
# 首次使用：复制本文件为 config.ini，并填写 OPENAI_API_KEY。
# OPENAI_BASE_URL 填根地址即可，不要带 /v1。

OPENAI_BASE_URL=https://api.henng.cn
OPENAI_API_KEY=
OPENAI_IMAGE_MODEL=gpt-image-2

IMAGE_WEBUI_HOST=127.0.0.1
IMAGE_WEBUI_PORT=7861
IMAGE_WEBUI_TIMEOUT=240

# 0 = 启动后自动打开浏览器
# 1 = 不自动打开浏览器
IMAGE_WEBUI_NO_BROWSER=0

# 1 = 自动保存生成图片到输出目录
# 0 = 只在浏览器展示，不落盘保存
IMAGE_WEBUI_SAVE_OUTPUTS=1
IMAGE_WEBUI_OUTPUT_DIR=outputs
IMAGE_WEBUI_LOG_DIR=logs

# 单张上传图片最大 MB；整个 HTTP 请求最大 MB
IMAGE_WEBUI_MAX_UPLOAD_MB=50
IMAGE_WEBUI_MAX_BODY_MB=80

# 1 = Mock 测试模式，不请求上游、不消耗额度
# 0 = 真实请求当前中转
IMAGE_WEBUI_MOCK=0

# 中转兼容开关：默认关闭，生成请求只发送必要字段
IMAGE_WEBUI_FORCE_RESPONSE_FORMAT=0
IMAGE_WEBUI_INCLUDE_STREAM_FLAG=0

