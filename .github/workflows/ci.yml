name: 自动测试

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: imagebot-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: 获取源码
        uses: actions/checkout@v7.0.0

      - name: 准备 Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"

      - name: 运行测试
        shell: pwsh
        run: ./scripts/Test-ImageBot.ps1
