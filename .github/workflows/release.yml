name: 发布新版

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: 获取源码
        uses: actions/checkout@v7.0.0

      - name: 准备 Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"

      - name: 自动测试
        shell: pwsh
        run: ./scripts/Test-ImageBot.ps1

      - name: 生成发布包
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: ./scripts/New-ReleasePackage.ps1 -Tag "${{ github.ref_name }}" -OutputDirectory ./dist

      - name: 保存构建产物
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ImageBot-${{ github.ref_name }}
          path: |
            dist/ImageBot-${{ github.ref_name }}.zip
            dist/ImageBot-${{ github.ref_name }}.zip.sha256
          if-no-files-found: error

      - name: 发布到 GitHub
        uses: softprops/action-gh-release@v3.0.1
        with:
          name: ImageBot ${{ github.ref_name }}
          files: |
            dist/ImageBot-${{ github.ref_name }}.zip
            dist/ImageBot-${{ github.ref_name }}.zip.sha256
          body: |
            # ImageBot ${{ github.ref_name }} 更新说明

            ## 本版更新

            - 新增 `ImageBot.exe`，双击即可启动，不再显示黑色命令窗口。
            - 新增 Windows 托盘菜单，可重新打开页面、重新启动服务或完全退出。
            - 自动更新会校验 SHA-256，更新失败时自动恢复原文件。
            - 设置中新增“恢复上一版本”，更新后遇到问题可以一键恢复。
            - 新增自动化测试，发布前会检查程序语法、生成接口、历史记录、本地存储、更新恢复和退出流程。

            ## 开始使用

            1. 下载 `ImageBot-${{ github.ref_name }}.zip`。
            2. 完整解压压缩包。
            3. 双击 `ImageBot.exe`。
            4. 第一次打开时填写接口密钥并保存。
            5. 输入想生成的画面，也可以上传参考图片，然后点击“生成”。

            ## 旧版本升级

            从 `v1.3.0` 使用页面内更新，可以升级核心程序，但旧版更新器不会下载本次首次新增的 `ImageBot.exe`。需要无黑窗启动时，请手动下载本版压缩包并重新解压；原来的 `config.ini` 可以继续使用。

            ## 说明

            - 更新与恢复不会删除 `config.ini`、历史记录、日志或已生成图片。
            - `ImageBot-${{ github.ref_name }}.zip.sha256` 用于核对下载文件完整性。
            - 未配置 Windows 代码签名证书时，系统可能在首次运行时显示安全提示。
            - 发布包不包含作者的接口密钥或本地生成记录。
